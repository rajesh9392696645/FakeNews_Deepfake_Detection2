<!DOCTYPE html>
<html>

<head>

<title>Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
rel="stylesheet">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
rel="stylesheet">

</head>

<body>

<nav class="navbar navbar-dark bg-dark">

<div class="container-fluid">

<a class="navbar-brand">
Fake News & Deepfake Detection System
</a>

<a href="/logout"
class="btn btn-danger">
Logout
</a>

</div>

</nav>

<div class="container mt-4">

<div class="row">

<div class="col-md-4">

<div class="card text-center shadow">

<div class="card-body">

<h5>Total Predictions</h5>

<h2>
{{ total }}
</h2>

</div>

</div>

</div>

<div class="col-md-4">

<div class="card text-center shadow">

<div class="card-body">

<h5>Fake Detected</h5>

<h2 class="text-danger">
{{ fake }}
</h2>

</div>

</div>

</div>

<div class="col-md-4">

<div class="card text-center shadow">

<div class="card-body">

<h5>Real Detected</h5>

<h2 class="text-success">
{{ real }}
</h2>

</div>

</div>

</div>

</div>

<hr>

<div class="row mt-4">

<div class="col-md-3">

<a href="/news"
class="btn btn-primary w-100 p-4">

<i class="fas fa-newspaper"></i>

<br><br>

Fake News Detection

</a>

</div>

<div class="col-md-3">

<a href="/image"
class="btn btn-warning w-100 p-4">

<i class="fas fa-image"></i>

<br><br>

Deepfake Image Detection

</a>

</div>

<div class="col-md-3">

<a href="/video"
class="btn btn-success w-100 p-4">

<i class="fas fa-video"></i>

<br><br>

Deepfake Video Detection

</a>

</div>

<div class="col-md-3">

<a href="/history"
class="btn btn-info w-100 p-4">

<i class="fas fa-history"></i>

<br><br>

Prediction History

</a>

</div>

</div>

<hr>

<div class="row mt-4">

<div class="col-md-3">

<a href="/generate-image"
class="btn btn-secondary w-100 p-4">

Generate Fake Image

</a>

</div>

<div class="col-md-3">

<a href="/generate-video"
class="btn btn-dark w-100 p-4">

Generate Fake Video

</a>

</div>

<div class="col-md-3">

<a href="/evaluation"
class="btn btn-primary w-100 p-4">

Evaluation Metrics

</a>

</div>

<div class="col-md-3">

<a href="/reports"
class="btn btn-success w-100 p-4">

Reports

</a>

</div>

</div>

</div>

</body>
</html>
