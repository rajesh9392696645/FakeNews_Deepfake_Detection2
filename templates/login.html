<!DOCTYPE html>
<html>
<head>
    <title>Login - Fake News & Deepfake Detection</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f4f6f9;
        }

        .login-card{
            width:400px;
            margin:auto;
            margin-top:100px;
            padding:30px;
            border-radius:15px;
            background:white;
            box-shadow:0px 0px 15px rgba(0,0,0,0.1);
        }
    </style>

</head>
<body>

<div class="login-card">

    <h2 class="text-center mb-4">
        Login
    </h2>

    <form method="POST">

        <div class="mb-3">
            <label>Email</label>

            <input type="email"
                   name="email"
                   class="form-control"
                   required>
        </div>

        <div class="mb-3">
            <label>Password</label>

            <input type="password"
                   name="password"
                   class="form-control"
                   required>
        </div>

        <button class="btn btn-primary w-100">
            Login
        </button>

    </form>

    <hr>

    <p class="text-center">
        Don't have an account?
        <a href="/register">Register</a>
    </p>

</div>

</body>
</html>
