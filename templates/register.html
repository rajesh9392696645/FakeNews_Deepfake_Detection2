<!DOCTYPE html>
<html>
<head>

<title>Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
rel="stylesheet">

<style>

body{
background:#f5f5f5;
}

.register-card{
width:450px;
margin:auto;
margin-top:70px;
padding:30px;
background:white;
border-radius:15px;
box-shadow:0px 0px 15px rgba(0,0,0,0.1);
}

</style>

</head>

<body>

<div class="register-card">

<h2 class="text-center mb-4">
Create Account
</h2>

<form method="POST">

<div class="mb-3">

<label>Username</label>

<input
type="text"
name="username"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Email</label>

<input
type="email"
name="email"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Password</label>

<input
type="password"
name="password"
class="form-control"
required>

</div>

<button class="btn btn-success w-100">
Register
</button>

</form>

<hr>

<p class="text-center">

Already have an account?

<a href="/login">
Login
</a>

</p>

</div>

</body>
</html>
