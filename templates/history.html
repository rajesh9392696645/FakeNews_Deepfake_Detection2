<!DOCTYPE html>
<html>
<head>
<title>Prediction History</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

<h2>Prediction History</h2>

<table class="table table-striped">

<thead>

<tr>
<th>ID</th>
<th>Type</th>
<th>File</th>
<th>Result</th>
<th>Confidence</th>
<th>Date</th>
</tr>

</thead>

<tbody>

{% for row in records %}

<tr>

<td>{{ row[0] }}</td>
<td>{{ row[2] }}</td>
<td>{{ row[3] }}</td>
<td>{{ row[4] }}</td>
<td>{{ row[5] }}</td>
<td>{{ row[9] }}</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</body>
</html>
