<!DOCTYPE html>
<html>

<head>

<title>Reports</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
rel="stylesheet">

<style>

body{
background:#f5f5f5;
}

.report-card{

border-radius:12px;

padding:25px;

margin-top:20px;

background:white;

box-shadow:0 0 10px rgba(0,0,0,.1);

}

pre{

background:#212529;

color:white;

padding:20px;

border-radius:8px;

overflow:auto;

max-height:500px;

}

</style>

</head>

<body>

<div class="container mt-5">

<h2 class="mb-4">

Reports Dashboard

</h2>


<div class="report-card">

<h4 class="mb-3">

Download Reports

</h4>


<a href="/download/pdf"
class="btn btn-danger mb-2">

Download PDF Report

</a>


<a href="/download/excel"
class="btn btn-success mb-2">

Download Excel Report

</a>


<a href="/view_report"
class="btn btn-primary mb-2">

View Metrics Report

</a>

</div>


<div class="report-card">

<h4>

Report Preview

</h4>

<pre>

{{ report_content }}

</pre>

</div>


<div class="mt-4">

<a href="/dashboard"
class="btn btn-dark">

Back to Dashboard

</a>

</div>

</div>

</body>

</html>
