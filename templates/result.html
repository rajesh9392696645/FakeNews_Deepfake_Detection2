<!DOCTYPE html>
<html>
<head>
<title>Prediction Result</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

<div class="card shadow">

<div class="card-body">

<h2 class="text-center">
Prediction Result
</h2>

<hr>

<h4>
Prediction :
<span class="text-danger">
{{ prediction }}
</span>
</h4>

<h4>
Confidence :
{{ confidence }} %
</h4>

<hr>

<h3>Model Performance</h3>

<table class="table table-bordered">

<tr>
<th>Accuracy</th>
<td>{{ accuracy }}</td>
</tr>

<tr>
<th>Precision</th>
<td>{{ precision }}</td>
</tr>

<tr>
<th>Recall</th>
<td>{{ recall }}</td>
</tr>

<tr>
<th>F1 Score</th>
<td>{{ f1_score }}</td>
</tr>

</table>

<hr>

<h3>Confusion Matrix</h3>

<img
src="/static/charts/confusion_matrix.png"
class="img-fluid">

<hr>

<h3>ROC Curve</h3>

<img
src="/static/charts/roc_curve.png"
class="img-fluid">

<hr>

<h3>Download Report</h3>

<a href="/download/pdf"
class="btn btn-danger">
PDF Report
</a>

<a href="/download/excel"
class="btn btn-success">
Excel Report
</a>

</div>

</div>

</div>

</body>
</html>
